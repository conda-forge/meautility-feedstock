{% set name = "MEAutility" %}
{% set version = "1.5.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.lower() }}-{{ version }}.tar.gz
  sha256: 1bc5ba4b066a9e3c7383f43125a43e032552a10de38a5eff1058ed65fa733a1b

build:
  number: 0
  noarch: python
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv '

requirements:
  host:
    - pip
    - python >=3.6
  run:
    - matplotlib-base
    - numpy
    - python >=3.6
    - pyyaml

test:
  requires:
    - pytest
  imports:
    - MEAutility
    - MEAutility.tests
  commands:
    - py.test -vsx --pyargs MEAutility

about:
  home: https://github.com/alejoe91/MEAutility
  license: GPL-3.0-only
  license_family: GPL3
  license_file: LICENSE
  summary: Python package for multi-electrode array (MEA) handling and stimulation.
  doc_url: https://meautility.readthedocs.io/en/latest/
  dev_url: https://github.com/alejoe91/MEAutility

extra:
  recipe-maintainers:
    - alejoe91
    - espenhgn
